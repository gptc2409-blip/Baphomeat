<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPHOM | Member Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; }
        .modal.active { display: block; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        input { border-radius: 0 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="bg-white text-black selection:bg-black selection:text-white">

    <div id="cartDrawer" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-[100] shadow-2xl translate-x-full cart-drawer flex flex-col border-l border-gray-100">
        <div class="p-8 flex justify-between items-center border-b border-gray-50">
            <h2 class="text-[10px] font-bold tracking-[0.4em] uppercase">Carrinho</h2>
            <button onclick="toggleCart()" class="text-[10px] font-bold uppercase cursor-pointer">Fechar [X]</button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
        <div class="p-8 bg-zinc-50">
            <div class="flex justify-between mb-6 text-[10px] font-bold uppercase tracking-widest">
                <span>Total</span>
                <span id="cartTotal">€ 0</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-black text-white py-5 text-[10px] font-bold tracking-[0.4em] uppercase hover:bg-zinc-800 transition-all">Finalizar Pedido</button>
        </div>
    </div>

    <div id="authModal" class="modal z-[150] flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white w-full max-w-[450px] p-10 relative">
            <button onclick="toggleAuth()" class="absolute top-6 right-6 font-bold text-[10px] uppercase">[X]</button>
            
            <div id="loginForm">
                <h2 class="text-3xl font-black tracking-tighter mb-8 uppercase">Login</h2>
                <input type="email" id="loginEmail" placeholder="EMAIL" class="w-full border-b border-black py-4 text-[10px] outline-none mb-4 uppercase">
                <input type="password" id="loginPass" placeholder="SENHA" class="w-full border-b border-black py-4 text-[10px] outline-none mb-8 uppercase">
                <button onclick="handleLogin()" class="w-full bg-black text-white py-4 text-[10px] font-bold tracking-[0.4em] uppercase mb-6">Entrar</button>
                <p class="text-[9px] text-center tracking-widest text-gray-400">NÃO TEM CONTA? <button onclick="switchAuth()" class="text-black underline">CADASTRE-SE</button></p>
            </div>

            <div id="registerForm" class="hidden">
                <h2 class="text-3xl font-black tracking-tighter mb-8 uppercase">Criar Conta</h2>
                <input type="email" id="regEmail" placeholder="EMAIL" class="w-full border-b border-black py-4 text-[10px] outline-none mb-4 uppercase">
                <input type="password" id="regPass" placeholder="SENHA" class="w-full border-b border-black py-4 text-[10px] outline-none mb-8 uppercase">
                
                <button onclick="handleRegister()" class="w-full bg-black text-white py-4 text-[10px] font-bold tracking-[0.4em] uppercase mb-6">Criar Conta</button>
                
                <p class="text-[9px] text-center tracking-widest text-gray-400">JÁ TEM CONTA? <button onclick="switchAuth()" class="text-black underline">LOGIN</button></p>
            </div>
        </div>
    </div>

    <nav class="fixed w-full z-50 px-6 py-6 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="flex-1 flex gap-6 text-[9px] font-bold tracking-[0.2em] items-center">
            <a href="#shop" class="hidden md:block hover:opacity-50 transition">SHOP</a>
            <a href="https://instagram.com/jona___tas" target="_blank" class="hover:opacity-50 transition uppercase">@jona___tas</a>
        </div>
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase text-center" onclick="window.scrollTo(0,0)">
            BAPHOM<span class="font-light italic text-gray-400"> STUDIO</span>
        </div>
        <div class="flex-1 flex justify-end gap-6 text-[9px] font-bold tracking-[0.2em] items-center uppercase">
            <button id="userBtn" onclick="toggleAuth()" class="hover:opacity-50 transition">Account</button>
            <button onclick="toggleCart()" class="hover:opacity-50 transition">Cart (<span id="cartCount">0</span>)</button>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center bg-black overflow-hidden">
        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=1600" class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10 text-center text-white px-4">
            <h1 class="text-7xl md:text-[140px] font-black tracking-tighter leading-none mb-8">BAPHOM</h1>
            <a href="#shop" class="inline-block bg-white text-black px-12 py-5 text-[10px] font-bold tracking-[0.5em] hover:bg-zinc-200 transition-all uppercase">Shop Archive</a>
        </div>
    </section>

    <main id="shop" class="max-w-[1400px] mx-auto px-6 py-32 grid grid-cols-1 md:grid-cols-3 gap-16">
        <div class="group cursor-pointer reveal" onclick="openProduct(1, 'Cyber Puffer', 1450, 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=800')">
            <div class="aspect-[3/4] overflow-hidden bg-zinc-100 mb-6"><img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700"></div>
            <div class="flex justify-between text-[10px] font-bold tracking-widest uppercase"><h3>Cyber Puffer</h3><span>€ 1.450</span></div>
        </div>
        <div class="group cursor-pointer reveal" onclick="openProduct(2, 'Void Pants', 920, 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80&w=800')">
            <div class="aspect-[3/4] overflow-hidden bg-zinc-100 mb-6"><img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700"></div>
            <div class="flex justify-between text-[10px] font-bold tracking-widest uppercase"><h3>Void Pants</h3><span>€ 920</span></div>
        </div>
        <div class="group cursor-pointer reveal" onclick="openProduct(3, 'Monolith Boot', 1100, 'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?auto=format&fit=crop&q=80&w=800')">
            <div class="aspect-[3/4] overflow-hidden bg-zinc-100 mb-6"><img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700"></div>
            <div class="flex justify-between text-[10px] font-bold tracking-widest uppercase"><h3>Monolith Boot</h3><span>€ 1.100</span></div>
        </div>
    </main>

    <div id="productModal" class="modal p-6 md:p-20">
        <button onclick="closeProduct()" class="fixed top-8 right-8 font-bold text-[10px] tracking-widest z-[110] bg-black text-white px-6 py-3 uppercase">Voltar [X]</button>
        <div class="flex flex-col md:flex-row gap-16 max-w-[1100px] mx-auto mt-12">
            <div class="flex-1"><img id="modalImg" src="" class="w-full aspect-[3/4] object-cover grayscale"></div>
            <div class="flex-1 flex flex-col justify-center">
                <h2 id="modalTitle" class="text-5xl font-black tracking-tighter mb-4 uppercase"></h2>
                <p id="modalPrice" class="text-xl mb-12 font-light"></p>
                <button id="addBtn" class="bg-black text-white py-6 text-[10px] font-bold tracking-[0.5em] uppercase hover:invert transition-all">Add to Cart</button>
            </div>
        </div>
    </div>

    <footer class="p-20 border-t border-gray-100 text-center space-y-12">
        <h2 class="text-4xl font-black tracking-tighter uppercase">BAPHOM</h2>
        <div class="flex justify-center gap-10 text-[9px] font-bold tracking-[0.3em] uppercase text-gray-400">
            <a href="https://instagram.com/jona___tas" target="_blank" class="hover:text-black transition">Instagram</a>
            <button onclick="togglePrivacy()" class="hover:text-black transition">Privacy</button>
        </div>
        <p class="text-[8px] text-gray-300 tracking-[0.4em]">© 2026 BAPHOM STUDIO / @JONA___TAS</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfQR5oGS4oBAo8n2KHynFOxgUlnZvmwHM",
            authDomain: "baphom-d0d13.firebaseapp.com",
            projectId: "baphom-d0d13",
            storageBucket: "baphom-d0d13.firebasestorage.app",
            messagingSenderId: "404007926967",
            appId: "1:404007926967:web:64bf534913a0af153ba132",
            measurementId: "G-3B06HYF62Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // AUTH FUNCTIONS
        window.toggleAuth = () => document.getElementById('authModal').classList.toggle('active');
        window.switchAuth = () => {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        };

        window.handleRegister = async function() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            if(!email || !pass) return alert("Preencha todos os campos.");
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Conta criada no Firebase!");
                toggleAuth();
            } catch (err) { alert(err.message); }
        };

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                toggleAuth();
            } catch (err) { alert("Acesso negado."); }
        };

        window.handleLogout = () => { if(confirm("Deseja sair?")) signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            const userBtn = document.getElementById('userBtn');
            if (user) {
                userBtn.innerText = user.email.split('@')[0].toUpperCase();
                userBtn.onclick = handleLogout;
            } else {
                userBtn.innerText = 'Account';
                userBtn.onclick = toggleAuth;
            }
        });

        // CART LOGIC
        let cart = JSON.parse(localStorage.getItem('baphom_cart')) || [];
        let activeProd = null;

        window.updateCart = function() {
            localStorage.setItem('baphom_cart', JSON.stringify(cart));
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = '';
            cart.forEach((item, i) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex gap-4 border-b border-gray-50 pb-4">
                        <img src="${item.img}" class="w-16 h-20 object-cover">
                        <div class="flex-1">
                            <h4 class="text-[9px] font-bold tracking-widest uppercase">${item.name}</h4>
                            <button onclick="removeItem(${i})" class="text-[8px] underline mt-4 uppercase">Remover</button>
                        </div>
                        <span class="text-[10px]">€${item.price}</span>
                    </div>`;
            });
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartTotal').innerText = `€ ${total.toLocaleString()}`;
        };

        window.openProduct = function(id, name, price, img) {
            activeProd = { id, name, price, img };
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = `€ ${price}`;
            document.getElementById('modalImg').src = img;
            document.getElementById('productModal').classList.add('active');
        };

        document.getElementById('addBtn').onclick = () => {
            cart.push(activeProd);
            updateCart();
            document.getElementById('productModal').classList.remove('active');
            toggleCart();
        };

        window.removeItem = (i) => { cart.splice(i, 1); updateCart(); };
        window.toggleCart = () => document.getElementById('cartDrawer').classList.toggle('translate-x-full');
        window.closeProduct = () => document.getElementById('productModal').classList.remove('active');
        window.togglePrivacy = () => document.getElementById('privacyModal').classList.toggle('active');

        window.checkoutWhatsApp = function() {
            const user = auth.currentUser;
            if(!user) return alert("Faça login para finalizar.");
            let msg = `BAPHOM ORDER - ${user.email}%0A%0A`;
            cart.forEach(item => { msg += `- ${item.name} (€${item.price})%0A`; });
            window.open(`https://wa.me/SEUNUMERO?text=${msg}`, '_blank');
        };

        const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting && e.target.classList.add('active')), { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

        updateCart();
    </script>
</body>
</html>
