<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPHOM | Member Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .modal { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        input { border-radius: 0 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="bg-white text-black selection:bg-black selection:text-white">

    <nav class="fixed w-full z-50 px-6 py-6 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="flex-1 flex gap-6 text-[9px] font-bold tracking-[0.2em] items-center">
            <a href="#shop" class="hidden md:block hover:opacity-50 transition">SHOP</a>
            <a href="https://instagram.com/jona___tas" target="_blank" class="hover:opacity-50 transition uppercase">@jona___tas</a>
        </div>
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase text-center" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            BAPHOM<span class="font-light italic text-gray-400"> STUDIO</span>
        </div>
        <div class="flex-1 flex justify-end gap-6 text-[9px] font-bold tracking-[0.2em] items-center uppercase">
            <button id="userBtn" type="button" class="hover:opacity-50 transition">Account</button>
            <button type="button" onclick="toggleCart()" class="hover:opacity-50 transition">Cart (<span id="cartCount">0</span>)</button>
        </div>
    </nav>

    <div id="authModal" class="modal z-[150]">
        <div class="bg-white w-full max-w-[450px] p-10 relative shadow-2xl mx-4">
            <button type="button" onclick="toggleAuth()" class="absolute top-6 right-6 font-bold text-[10px] uppercase">[X]</button>
            
            <div id="loginForm">
                <h2 class="text-3xl font-black tracking-tighter mb-8 uppercase">Login</h2>
                <input type="email" id="loginEmail" placeholder="EMAIL" class="w-full border-b border-black py-4 text-[10px] outline-none mb-4 uppercase">
                <input type="password" id="loginPass" placeholder="SENHA" class="w-full border-b border-black py-4 text-[10px] outline-none mb-8 uppercase">
                <button type="button" onclick="handleLogin()" class="w-full bg-black text-white py-4 text-[10px] font-bold tracking-[0.4em] uppercase mb-6 hover:bg-zinc-800 transition">Entrar</button>
                <p class="text-[9px] text-center tracking-widest text-gray-400 uppercase">Não tem conta? <button type="button" onclick="switchAuth()" class="text-black underline">Cadastre-se</button></p>
            </div>

            <div id="registerForm" class="hidden">
                <h2 class="text-3xl font-black tracking-tighter mb-8 uppercase">Criar Conta</h2>
                <input type="email" id="regEmail" placeholder="EMAIL" class="w-full border-b border-black py-4 text-[10px] outline-none mb-4 uppercase">
                <input type="password" id="regPass" placeholder="SENHA" class="w-full border-b border-black py-4 text-[10px] outline-none mb-8 uppercase">
                <button type="button" onclick="handleRegister()" class="w-full bg-black text-white py-4 text-[10px] font-bold tracking-[0.4em] uppercase mb-6 hover:bg-zinc-800 transition">Criar Conta</button>
                <p class="text-[9px] text-center tracking-widest text-gray-400 uppercase">Já tem conta? <button type="button" onclick="switchAuth()" class="text-black underline">Login</button></p>
            </div>
        </div>
    </div>

    <section class="relative h-screen flex items-center justify-center bg-black">
        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=1600" class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10 text-center text-white">
            <h1 class="text-7xl md:text-[140px] font-black tracking-tighter leading-none mb-8">BAPHOM</h1>
            <a href="#shop" class="inline-block bg-white text-black px-12 py-5 text-[10px] font-bold tracking-[0.5em] hover:bg-zinc-200 transition uppercase">Shop Archive</a>
        </div>
    </section>

    <main id="shop" class="max-w-[1400px] mx-auto px-6 py-32 grid grid-cols-1 md:grid-cols-3 gap-16">
        <div class="group cursor-pointer reveal" onclick="openProduct(1, 'Cyber Puffer', 1450, 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=800')">
            <div class="aspect-[3/4] overflow-hidden bg-zinc-100 mb-6"><img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-700"></div>
            <div class="flex justify-between text-[10px] font-bold tracking-widest uppercase"><h3>Cyber Puffer</h3><span>€ 1.450</span></div>
        </div>
        </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfQR5oGS4oBAo8n2KHynFOxgUlnZvmwHM",
            authDomain: "baphom-d0d13.firebaseapp.com",
            projectId: "baphom-d0d13",
            storageBucket: "baphom-d0d13.firebasestorage.app",
            messagingSenderId: "404007926967",
            appId: "1:404007926967:web:64bf534913a0af153ba132",
            measurementId: "G-3B06HYF62Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- FUNÇÕES DE INTERFACE ---
        window.toggleAuth = () => {
            const modal = document.getElementById('authModal');
            modal.classList.toggle('active');
        };

        window.switchAuth = () => {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        };

        // --- LÓGICA DE CADASTRO ---
        window.handleRegister = async function() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            if(!email || !pass) return alert("Preencha os campos.");

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                document.getElementById('authModal').classList.remove('active'); 
                console.log("Conta Criada");
            } catch (err) { alert(err.message); }
        };

        // --- LÓGICA DE LOGIN ---
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('authModal').classList.remove('active'); 
                console.log("Login OK");
            } catch (err) { alert("Dados inválidos."); }
        };

        // --- MONITOR DE USUÁRIO ---
        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('userBtn');
            if (user) {
                btn.innerText = user.email.split('@')[0].toUpperCase();
                btn.onclick = () => confirm("Sair?") && signOut(auth);
            } else {
                btn.innerText = 'Account';
                btn.onclick = toggleAuth;
            }
        });

        // Scroll Reveal
        const obs = new IntersectionObserver(ents => ents.forEach(e => e.isIntersecting && e.target.classList.add('active')), { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    </script>
</body>
</html>
